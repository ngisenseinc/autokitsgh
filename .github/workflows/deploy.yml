name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Deploy to Vercel
        uses: vercel/action@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

      - name: Health Check (Production)
        if: success()
        run: |
          echo "Waiting for deployment to stabilize..."
          DEPLOY_URL=$(curl -s https://api.vercel.com/v6/deployments | head -n1 | grep -E -o 'https://[A-Za-z0-9_.-]*/' || true)
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not determine deployment URL from Vercel."; exit 1
          fi
          HEALTH_URL="${DEPLOY_URL}api/health"
          echo "Health check URL: $HEALTH_URL"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" )
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (200)";
              exit 0;
            fi
            sleep 10
          done
          echo "Health check failed after retries";
          exit 1
